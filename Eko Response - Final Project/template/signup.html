<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location Picker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
  <style>
    #location-results {
  max-height: 200px;
  overflow-y: scroll;
  border: 1px solid #ddd;
  padding: 5px;
}

#location-results li {
  cursor: pointer;
  margin-bottom: 5px;
}

#location-results li.selected {
  background-color: #eee;
}

  </style>
</head>
<body>
  <div class="container mt-5">
    <h1>Choose Your Location</h1>
    <div class="row">
      <div class="col-md-6">
        <div class="input-group mb-3">
          <input type="text" class="form-control" id="location-input" placeholder="Enter Location">
          <button class="btn btn-primary" id="search-btn">Search</button>
        </div>
        <div id="location-results"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5bLdoCWwjJy7sSmul8GwNwzpYOI+znmVEQ0z /xA7VQ=" crossorigin="anonymous"></script>
</body>
</html>
